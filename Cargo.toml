[workspace]
members = [
    "bench/frontier-cs/runner",
    "bench/oolong/runner",
    "bench/longcot/runner",
    "bench/longmemeval-rlm/runner",
    "bench/swebench/runner",
    "bench/continual-learning-bench/runner",
]
resolver = "3"

[workspace.package]
version = "0.1.0-alpha.9"
license = "MIT"
edition = "2024"
publish = false

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = "0.4"
clap = "4"
regex = "1"
reqwest = { version = "0.13", default-features = false }
serde = "1"
serde_json = "1"
tokio = "1"
tokio-util = "0.7"
